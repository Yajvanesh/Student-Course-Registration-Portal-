<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>ABC Training Institute</h1>
</header>

<nav>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="courses.html">Courses</a></li>
<li><a href="registration.html">Registration</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

<div class="container">

<div class="card">

<h2>Student Registration Form</h2>

<form id="registrationForm">

<label>Full Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Mobile Number</label>
<input type="text" id="mobile">

<label>Gender</label>

<div class="radio-group">
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
</div>

<label>Department</label>
<input type="text" id="department">

<label>Course</label>

<select id="course">

<option value="">Select Course</option>
<option>Web Development</option>
<option>Python</option>
<option>Java</option>
<option>Artificial Intelligence</option>
<option>Data Science</option>

</select>

<label>Skills</label>

<div class="checkbox-group">

<input type="checkbox" value="HTML">HTML

<input type="checkbox" value="CSS">CSS

<input type="checkbox" value="JavaScript">JavaScript

<input type="checkbox" value="Python">Python

</div>

<label>Date of Birth</label>

<input type="date" id="dob">

<label>Address</label>

<textarea id="address" rows="4"></textarea>

<div class="buttons">

<button type="reset">Reset</button>

</div>

</form>

</div>

</div>

<footer>

<p>© 2026 ABC Training Institute | All Rights Reserved</p>

</footer>

<script src="script.js"></script>

</body>

</html>
